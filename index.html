<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon tracker hebdomadaire</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:0}
.app{max-width:980px;margin:0 auto;padding:0 16px 40px}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid #e5e5e3;margin-bottom:24px;padding-top:20px}
.tab{padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab.active{color:#1a1a18;border-bottom-color:#1D9E75}
.tab:hover:not(.active){color:#555}
.tab-content{display:none}.tab-content.active{display:block}
/* HEADER */
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:20px}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.week-nav span{font-size:14px;font-weight:500}
button{font-family:inherit;font-size:13px;padding:6px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;color:#1a1a18;transition:background .1s}
button:hover{background:#f0f0ee}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e5e5e3}
.stat-label{font-size:12px;color:#888;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:600;color:#1a1a18}
.stat-val.good{color:#1D9E75}.stat-val.warn{color:#BA7517}
.pbar{height:6px;background:#e5e5e3;border-radius:3px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:3px;background:#1D9E75;transition:width .3s}
/* CAT BLOCKS */
.cat-block{background:#fff;border:1px solid #e5e5e3;border-radius:12px;margin-bottom:12px;overflow:hidden}
.cat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.cat-header:hover{background:#f8f8f6}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:14px;font-weight:600;flex:1}
.cat-pct{font-size:13px;color:#888}
.cat-arrow{font-size:12px;color:#aaa;transition:transform .2s}
.cat-arrow.open{transform:rotate(90deg)}
.cat-bar-outer{height:4px;background:#f0f0ee}
.cat-bar-inner{height:100%;transition:width .3s}
/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:580px}
thead th{font-size:11px;font-weight:600;color:#888;text-align:center;padding:8px 4px;border-bottom:1px solid #e5e5e3;background:#fafaf8}
thead th.tcol{text-align:left;padding-left:16px;min-width:170px}
tbody td{padding:6px 4px;text-align:center;border-bottom:1px solid #f0f0ee;font-size:13px;vertical-align:middle}
tbody td.tname{text-align:left;padding-left:16px;font-size:13px;color:#1a1a18}
tbody td.tname.sub{padding-left:32px;font-size:12px;color:#555}
tbody tr.subrow td{background:#fafaf8}
/* CHECKBOX CELL */
.chk-cell{position:relative;width:36px}
.chk-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px}
input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:#1D9E75}
.note-dot{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:#185FA5;pointer-events:none}
.has-note-prev{position:absolute;bottom:1px;right:1px;width:6px;height:6px;border-radius:50%;background:#BA7517;pointer-events:none}
.note-btn{position:absolute;top:-6px;right:-8px;width:18px;height:18px;border-radius:50%;border:none;background:#185FA5;color:#fff;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0;line-height:1;z-index:10}
.chk-wrap:hover .note-btn{display:flex}
/* TOOLTIP */
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:11px;padding:6px 9px;border-radius:7px;white-space:pre-wrap;max-width:200px;z-index:100;line-height:1.5;text-align:left;pointer-events:none}
.tooltip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1a18}
.tooltip-wrap:hover .tooltip-box{display:block}
/* BADGES */
.freq-badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;background:#e8f5f0;color:#0F6E56;margin-left:6px;vertical-align:middle;white-space:nowrap}
.freq-badge.reached{background:#1D9E75;color:#fff}
.freq-badge.once{background:#FFF3E0;color:#BA7517;border:1px solid #F0C070}
.pct-cell{font-size:12px;color:#888;font-weight:500;min-width:44px}
.action-cell{white-space:nowrap;min-width:52px}
.icon-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0 3px;line-height:1;border-radius:4px}
.icon-btn:hover.edit{color:#185FA5;background:#e6f1fb}
.icon-btn:hover.del{color:#E24B4A;background:#fcebeb}
.dash{color:#ddd;font-size:16px}
.future-head{opacity:.4}
td.unscheduled{background:#fafaf8}
/* FORMS */
.add-row{padding:8px 16px;border-top:1px solid #f0f0ee;background:#fafaf8}
.add-row>button{font-size:12px;color:#888;border:none;background:none;padding:0}
.add-row>button:hover{color:#1a1a18;background:none}
.form-row{padding:12px 16px;background:#EBF4FF;border-top:1px solid #b5d4f4;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.form-row input[type=text]{font-size:13px;padding:5px 9px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18}
.form-row select{font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:12px;color:#555;font-weight:500}
.form-actions{display:flex;gap:6px;align-items:flex-end;padding-top:18px}
/* DAY PICKER */
.day-picker{display:flex;gap:4px}
.day-pill{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#888;user-select:none}
.day-pill.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.day-pill:hover:not(.on){background:#e8f5f0;border-color:#9FE1CB}
/* NOTE MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px 22px;width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:4px}
.modal .modal-sub{font-size:12px;color:#888;margin-bottom:14px}
.modal .prev-note{font-size:12px;background:#fafaf8;border:1px solid #e5e5e3;border-radius:8px;padding:8px 10px;margin-bottom:12px;color:#555;line-height:1.5}
.modal .prev-note strong{color:#BA7517;display:block;margin-bottom:3px;font-size:11px}
.modal textarea{width:100%;font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;resize:vertical;min-height:80px;color:#1a1a18;line-height:1.5}
.modal textarea:focus{outline:none;border-color:#185FA5}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
/* FOOTER */
.footer{margin-top:20px;padding-top:16px;border-top:1px solid #e5e5e3;display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-primary:hover{background:#0F6E56!important;border-color:#0F6E56;color:#fff}
.btn-danger{background:#fff;color:#E24B4A;border-color:#E24B4A}
.btn-danger:hover{background:#fcebeb!important}
/* HISTORY TAB */
.hist-year{margin-bottom:24px}
.hist-year-title{font-size:16px;font-weight:600;margin-bottom:12px;color:#1a1a18;display:flex;align-items:center;gap:8px}
.hist-month{margin-bottom:16px}
.hist-month-title{font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e5e5e3}
.hist-week{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:12px 16px;margin-bottom:8px}
.hist-week-header{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.hist-week-label{font-size:13px;font-weight:500;flex:1}
.hist-week-pct{font-size:13px;font-weight:600;color:#1D9E75}
.hist-week-pct.warn{color:#BA7517}
.hist-week-pct.low{color:#888}
.hist-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ee}
.hist-detail.open{display:block}
.hist-cat-row{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:13px}
.hist-cat-name{flex:1;color:#555}
.hist-cat-bar{flex:2;height:6px;background:#f0f0ee;border-radius:3px;overflow:hidden}
.hist-cat-fill{height:100%;border-radius:3px}
.hist-cat-pct{font-size:12px;font-weight:600;color:#888;min-width:36px;text-align:right}
.hist-empty{color:#aaa;font-size:14px;padding:24px 0;text-align:center}
.hist-note-entry{font-size:12px;color:#555;padding:3px 0;border-bottom:1px solid #f5f5f3;display:flex;gap:8px}
.hist-note-day{color:#888;min-width:40px;font-weight:500}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen" style="position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px">
  <style>
    @keyframes pulse-ring{0%{transform:scale(.9);opacity:.7}50%{transform:scale(1.05);opacity:1}100%{transform:scale(.9);opacity:.7}}
    @keyframes scan{0%{top:0}100%{top:100%}}
    @keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bar-fill{from{width:0%}to{width:100%}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .load-ring{width:80px;height:80px;border-radius:50%;border:2px solid #1a1a1a;border-top:2px solid #1D9E75;border-right:2px solid #1D9E75;animation:pulse-ring 2s ease-in-out infinite;position:relative;margin-bottom:32px}
    .load-ring::after{content:'';position:absolute;inset:8px;border-radius:50%;border:1px solid #0f3d2a;border-top:1px solid #1D9E75;animation:pulse-ring 1.5s ease-in-out infinite reverse}
    .load-bar-track{width:min(360px,90vw);height:3px;background:#111;border-radius:2px;overflow:hidden;position:relative;margin-top:28px}
    .load-bar-fill{height:100%;background:linear-gradient(90deg,#0a5c3a,#1D9E75,#4ecca3);border-radius:2px;animation:bar-fill 2.8s cubic-bezier(.4,0,.2,1) forwards}
    .load-bar-glow{position:absolute;right:0;top:-2px;width:20px;height:7px;background:#1D9E75;border-radius:50%;filter:blur(4px);animation:bar-fill 2.8s cubic-bezier(.4,0,.2,1) forwards}
    .load-status{font-size:11px;font-weight:600;letter-spacing:.15em;color:#1D9E75;margin-top:12px;animation:blink 1.4s ease-in-out infinite}
    .load-quote{font-size:15px;color:#888;text-align:center;max-width:340px;line-height:1.65;margin-top:36px;animation:fadein .8s ease forwards;font-style:italic}
    .load-quote strong{display:block;font-size:11px;font-weight:600;color:#444;margin-top:8px;font-style:normal;letter-spacing:.08em;text-transform:uppercase}
    .load-title{font-size:13px;font-weight:700;letter-spacing:.25em;color:#222;text-transform:uppercase;margin-bottom:8px}
  </style>
  <div class="load-ring"></div>
  <div class="load-title">TRACKER</div>
  <div class="load-bar-track"><div class="load-bar-fill"></div><div class="load-bar-glow"></div></div>
  <div class="load-status" id="load-status-txt">INITIALISATION</div>
  <div class="load-quote" id="load-quote-txt"></div>
</div>

<div class="app" id="main-app" style="opacity:0;transition:opacity .5s ease">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tracker')">Semaine</div>
    <div class="tab" onclick="switchTab('history')">Historique</div>
    <div style="margin-left:auto;padding:10px 4px;font-size:12px" id="sync-status"></div>
  </div>

  <!-- TRACKER TAB -->
  <div id="tab-tracker" class="tab-content active">
    <h1>Mon tracker hebdomadaire</h1>
    <div class="sub" id="week-label"></div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">&#8592;</button>
      <span id="week-range"></span>
      <button onclick="changeWeek(1)">&#8594;</button>
      <button onclick="goToday()" style="margin-left:auto">Aujourd'hui</button>
    </div>
    <div class="stats-grid" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat"><div class="stat-label">Aujourd'hui</div><div class="stat-val" id="st-today">—</div><div class="pbar"><div class="pfill" id="st-today-bar" style="width:0%"></div></div></div>
      <div class="stat"><div class="stat-label">Tâches complétées</div><div class="stat-val" id="st-done">—</div><div class="pbar"><div class="pfill" id="st-bar" style="width:0%"></div></div></div>
      <div class="stat"><div class="stat-label">Progression globale</div><div class="stat-val" id="st-pct">—</div></div>
      <div class="stat"><div class="stat-label">Meilleure catégorie</div><div class="stat-val" id="st-best" style="font-size:13px;padding-top:6px">—</div></div>
      <div class="stat"><div class="stat-label">Séquence actuelle</div><div class="stat-val" id="st-streak">—</div></div>
    </div>
    <div id="cats"></div>
    <div class="footer">
      <button class="btn-primary" onclick="exportTxt()">&#8659; Exporter semaine</button>
      <button onclick="exportAll()">&#8659; Historique complet</button>
      <button class="btn-danger" onclick="resetWeek()" style="margin-left:auto">&#8635; Réinitialiser semaine</button>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="tab-content">
    <h1>Historique</h1>
    <div class="sub">Toutes vos semaines archivées, compilées par mois et année.</div>
    <div id="hist-content"></div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="modal-bg" id="note-modal">
  <div class="modal">
    <h2 id="modal-title">Note d'entraînement</h2>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-prev" style="display:none" class="prev-note"></div>
    <textarea id="modal-note" placeholder="Ex: 3x8 @ 185 lbs, bonne énergie, augmenter le poids la prochaine fois..."></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveNote()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const DAYS_SHORT=['L','M','M','J','V','S','D'];
const DAYS_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const COLORS=['#1D9E75','#185FA5','#D85A30','#BA7517','#993556','#534AB7','#639922','#0F6E56','#993C1D'];

const DEFAULT={categories:[
  {id:'muscu',name:'Muscu',color:COLORS[0],tasks:[
    {id:'t1',name:'Séance haut du corps',days:[0,3],subtasks:[]},
    {id:'t2',name:'Séance bas du corps',days:[1,4],subtasks:[]},
    {id:'t3',name:'Core / ABS',days:[0,2,4],subtasks:[]}
  ]},
  {id:'cardio',name:'Cardio',color:COLORS[1],tasks:[
    {id:'t4',name:'Course (30min+)',days:[1,3,5],subtasks:[]},
    {id:'t5',name:'HIIT / Boxe',days:[2,5],subtasks:[]}
  ]},
  {id:'flex',name:'Flex & Mobilité',color:COLORS[2],tasks:[
    {id:'t6',name:'Étirements (15min)',days:[0,1,2,3,4],subtasks:[]},
    {id:'t7',name:'Grand écart',days:[0,2,4],subtasks:[]}
  ]},
  {id:'agilite',name:'Agilité',color:COLORS[5],tasks:[
    {id:'t8',name:'Muscle up',days:[0,2,4],subtasks:[]},
    {id:'t9',name:'Hand stand',days:[1,3,5],subtasks:[]}
  ]},
  {id:'sante',name:'Santé mentale',color:COLORS[4],tasks:[
    {id:'t10',name:'Lecture (10min)',days:[0,1,2,3,4,5,6],subtasks:[]},
    {id:'t11',name:'Marketing Skills (30min)',days:[0,1,2,3,4],subtasks:[]},
    {id:'t12',name:'Méditation',days:[0,1,2,3,4],subtasks:[]}
  ]},
  {id:'perso',name:'Objectifs perso',color:COLORS[3],tasks:[
    {id:'t13',name:'Vision / Focus journalier',days:[0,1,2,3,4,5,6],subtasks:[]},
    {id:'t14',name:'Poids / Nutrition',days:[0,1,2,3,4,5,6],subtasks:[]}
  ]}
]};

let weekOffset=0;
let openCats={};
let addingTo=null;
let editingTask=null;
let openHistWeeks={};
window._formDays={};
let _modalState=null; // {catId,taskId,dayIdx,subId,checkEl}

// ---- STORAGE ----
// ── GOOGLE SHEETS SYNC ──────────────────────────────────────
const GS_URL='https://script.google.com/macros/s/AKfycbzZFU5T6g3gs_HXukJhDTTrCn6BPbSVeiIoc9iR0sHA0VYrb9pVtIqn9PWBrmTUzQoffg/exec';

// In-memory cache so the UI stays snappy
// ── CACHE + LOCALSTORAGE BACKUP ─────────────────────────────
// Reads: cache first → localStorage → network (async, non-blocking)
// Writes: cache + localStorage immediately → network in background
const _cache={};

function showSyncStatus(msg,color){
  let el=document.getElementById('sync-status');
  if(!el)return;
  el.textContent=msg;
  el.style.color=color||'#888';
}

function lsGet(key){try{return localStorage.getItem('gs_'+key);}catch(e){return null;}}
function lsSet(key,val){try{localStorage.setItem('gs_'+key,val);}catch(e){}}
function lsDel(key){try{localStorage.removeItem('gs_'+key);}catch(e){}}

// Sync to network in background — never blocks UI
function gsSyncToNetwork(key,value){
  fetch(GS_URL,{method:'POST',body:JSON.stringify({action:'save',key,value})})
    .then(()=>showSyncStatus('✓ Synchronisé','#1D9E75'))
    .catch(()=>showSyncStatus('⚠ Hors ligne — données locales','#E24B4A'));
  setTimeout(()=>showSyncStatus('','#888'),3000);
}

// Get: cache → localStorage (instant) then fetch network in background to refresh
async function gsGet(key){
  // 1. Return from cache immediately if available
  if(_cache[key]!==undefined) return _cache[key];
  // 2. Try localStorage as instant fallback
  const ls=lsGet(key);
  if(ls!==null){
    _cache[key]=ls;
    // Refresh from network in background (non-blocking)
    fetch(`${GS_URL}?action=load&key=${encodeURIComponent(key)}`)
      .then(r=>r.json()).then(j=>{
        if(j.value!==null&&j.value!==undefined&&j.value!==ls){
          _cache[key]=j.value;
          lsSet(key,j.value);
        }
      }).catch(()=>{});
    return ls;
  }
  // 3. Nothing local — must wait for network (first load only)
  try{
    const r=await fetch(`${GS_URL}?action=load&key=${encodeURIComponent(key)}`);
    const j=await r.json();
    const val=j.value||null;
    _cache[key]=val;
    if(val)lsSet(key,val);
    return val;
  }catch(e){return null;}
}

// Set: update cache + localStorage instantly, sync network in background
async function gsSet(key,value){
  _cache[key]=value;
  lsSet(key,value);
  showSyncStatus('↑ Sync…','#BA7517');
  gsSyncToNetwork(key,value);
}

async function gsDel(key){
  delete _cache[key];
  lsDel(key);
  try{fetch(GS_URL,{method:'POST',body:JSON.stringify({action:'delete',key})});}catch(e){}
}

async function gsList(prefix){
  try{
    const r=await fetch(`${GS_URL}?action=list&prefix=${encodeURIComponent(prefix)}`);
    const j=await r.json();
    return j.keys||[];
  }catch(e){return[];}
}

// ── STORAGE API (async, Google Sheets-backed) ────────────────
async function loadStruct(){
  const s=await gsGet('tr_s4');
  return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT));
}
async function saveStruct(d){await gsSet('tr_s4',JSON.stringify(d));}

function ck(off){return 'tr_c4_'+(off===undefined?weekOffset:off);}
async function loadChk(off){const s=await gsGet(ck(off));return s?JSON.parse(s):{};}
function saveChk(c,off){gsSet(ck(off),JSON.stringify(c));}

function nk(off){return 'tr_n4_'+(off===undefined?weekOffset:off);}
async function loadNotes(off){const s=await gsGet(nk(off));return s?JSON.parse(s):{};}
async function saveNotes(n,off){await gsSet(nk(off),JSON.stringify(n));}

async function loadArchive(){const s=await gsGet('tr_arch4');return s?JSON.parse(s):[];}
async function saveArchive(a){await gsSet('tr_arch4',JSON.stringify(a));}
// ─────────────────────────────────────────────────────────────

function noteId(catId,taskId,dayIdx,subId){return subId?`${catId}_${taskId}_${subId}_${dayIdx}`:`${catId}_${taskId}_${dayIdx}`;}
function cid(cat,task,day,sub){return sub?`${cat}_${task}_${sub}_${day}`:`${cat}_${task}_${day}`;}

function getWeekDates(off){
  const o=off===undefined?weekOffset:off;
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate()+o*7);
  const day=base.getDay();
  const mon=new Date(base);
  mon.setDate(base.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function fmt(d){return d.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});}
function getScheduledDays(item){return(item.days&&item.days.length>0)?item.days:[0,1,2,3,4,5,6];}

function computeStats(data,checks){
  let tot=0,don=0,bycat={};
  data.categories.forEach(cat=>{
    let ct=0,cd=0;
    cat.tasks.forEach(t=>{
      const subs=t.subtasks||[];
      if(subs.length>0){
        subs.forEach(s=>{
          const days=getScheduledDays(s.days&&s.days.length?s:{days:t.days});
          days.forEach(d=>{ct++;if(checks[cid(cat.id,t.id,d,s.id)])cd++;});
        });
      } else {
        getScheduledDays(t).forEach(d=>{ct++;if(checks[cid(cat.id,t.id,d)])cd++;});
      }
    });
    tot+=ct;don+=cd;
    bycat[cat.id]={tot:ct,don:cd,name:cat.name,color:cat.color,pct:ct?Math.round(cd/ct*100):0};
  });
  return{tot,don,pct:tot?Math.round(don/tot*100):0,bycat};
}

function freqLabel(days){return days.length===7?'quotidien':days.length+'x/sem';}
function dayPickerHtml(sel,prefix){
  return DAYS_SHORT.map((d,i)=>`<span class="day-pill ${sel.includes(i)?'on':''}" onclick="toggleDayPill('${prefix}',${i},this)">${d}</span>`).join('');
}
function toggleDayPill(prefix,idx,el){
  if(!window._formDays[prefix])window._formDays[prefix]=[];
  const arr=window._formDays[prefix];
  const pos=arr.indexOf(idx);
  if(pos>=0){arr.splice(pos,1);el.classList.remove('on');}
  else{arr.push(idx);el.classList.add('on');}
}
function freqOpts(sel){
  return [1,2,3,4,5,6,7].map(n=>`<option value="${n}" ${sel===n?'selected':''}>${n}x/sem${n===7?' (quotidien)':''}</option>`).join('');
}

// ---- ARCHIVE ----
async function archiveCurrentWeek(){
  const data=await loadStruct();
  const checks=await loadChk();
  const notes=await loadNotes();
  const dates=getWeekDates();
  const s=computeStats(data,checks);
  const arch=await loadArchive();
  const dateStr=dates[0].toISOString().slice(0,10);
  const existing=arch.findIndex(w=>w.date===dateStr);
  const entry={date:dateStr,label:fmt(dates[0])+' – '+fmt(dates[6]),year:dates[0].getFullYear(),month:dates[0].getMonth(),pct:s.pct,don:s.don,tot:s.tot,bycat:s.bycat,notes:notes};
  if(existing>=0)arch[existing]=entry;else arch.push(entry);
  arch.sort((a,b)=>a.date.localeCompare(b.date));
  saveArchive(arch);
}

// ---- TABS ----
async function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['tracker','history'][i]===id));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='history')await renderHistory();
}

// ---- NOTE MODAL ----
async function openNoteModal(catId,taskId,dayIdx,subId,taskName,dayName){
  _modalState={catId,taskId,dayIdx,subId};
  document.getElementById('modal-title').textContent=taskName;
  document.getElementById('modal-sub').textContent=dayName+' — '+fmt(getWeekDates()[dayIdx]);
  const notes=await loadNotes();
  const nid=noteId(catId,taskId,dayIdx,subId);
  document.getElementById('modal-note').value=notes[nid]||'';
  const prevNotes=await loadNotes(weekOffset-1);
  const prevNote=prevNotes[nid];
  const prevEl=document.getElementById('modal-prev');
  if(prevNote){prevEl.style.display='block';prevEl.innerHTML='<strong>Semaine précédente</strong>'+escHtml(prevNote);}
  else{prevEl.style.display='none';}
  document.getElementById('note-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-note').focus({preventScroll:true}),50);
}
function closeModal(){document.getElementById('note-modal').classList.remove('open');_modalState=null;}
async function saveNote(){
  if(!_modalState)return;
  const {catId,taskId,dayIdx,subId}=_modalState;
  const val=document.getElementById('modal-note').value.trim();
  const notes=await loadNotes();
  const nid=noteId(catId,taskId,dayIdx,subId);
  if(val)notes[nid]=val;else delete notes[nid];
  saveNotes(notes);
  closeModal();
  const _sy=window.scrollY;await render();window.scrollTo({top:_sy,behavior:'instant'});
}
document.getElementById('note-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

// ---- RENDER ----
async function render(){
  const data=await loadStruct();
  const checks=await loadChk();
  const notes=await loadNotes();
  const prevNotes=await loadNotes(weekOffset-1);
  const ponctual=await loadPonctual();
  const dates=getWeekDates();

  // Merge ponctual tasks into a virtual render copy (this week only)
  const renderData=JSON.parse(JSON.stringify(data));
  ponctual.forEach(pt=>{
    const cat=renderData.categories.find(c=>c.id===pt.catId);
    if(cat)cat.tasks.push({...pt,ponctual:true});
  });

  const s=computeStats(renderData,checks);
  const _now=new Date();
  const today=new Date(_now.getFullYear(),_now.getMonth(),_now.getDate());

  document.getElementById('week-label').textContent='Semaine du '+fmt(dates[0])+' au '+fmt(dates[6]);
  document.getElementById('week-range').textContent=fmt(dates[0])+' – '+fmt(dates[6]);
  document.getElementById('st-done').textContent=s.don+' / '+s.tot;
  const p=s.pct;
  document.getElementById('st-pct').textContent=p+'%';
  document.getElementById('st-pct').className='stat-val '+(p>=70?'good':p>=40?'warn':'');
  document.getElementById('st-bar').style.width=p+'%';

  // Today % — all tasks scheduled for today
  const todayIdx=dates.findIndex(d=>d.toDateString()===today.toDateString());
  let tdd=0,tdt=0;
  if(todayIdx>=0){
    renderData.categories.forEach(cat=>cat.tasks.forEach(t=>{
      const subs=t.subtasks||[];
      if(subs.length>0){
        subs.forEach(sub=>{
          const sd=getScheduledDays(sub.days&&sub.days.length?sub:{days:t.days});
          if(sd.includes(todayIdx)){tdt++;if(checks[cid(cat.id,t.id,todayIdx,sub.id)])tdd++;}
        });
      } else {
        const sd=getScheduledDays(t);
        if(sd.includes(todayIdx)){tdt++;if(checks[cid(cat.id,t.id,todayIdx)])tdd++;}
      }
    }));
  }
  const tp2=tdt?Math.round(tdd/tdt*100):0;
  const todayEl=document.getElementById('st-today');
  todayEl.textContent=tdt?tp2+'%':'—';
  todayEl.className='stat-val '+(tp2>=100?'good':tp2>=50?'warn':'');
  document.getElementById('st-today-bar').style.width=tp2+'%';
  document.getElementById('st-today-bar').style.background=tp2>=100?'#1D9E75':tp2>=50?'#BA7517':'#E24B4A';
  const best=Object.values(s.bycat).sort((a,b)=>b.pct-a.pct)[0];
  document.getElementById('st-best').textContent=best?best.name+' ('+best.pct+'%)':'—';
  let streak=0;
  for(let i=dates.length-1;i>=0;i--){
    if(dates[i]>today)continue;
    let dd=0,dt=0;
    renderData.categories.forEach(cat=>cat.tasks.forEach(t=>{
      const subs=t.subtasks||[];
      if(subs.length>0){
        subs.forEach(sub=>{const sd=getScheduledDays(sub.days&&sub.days.length?sub:{days:t.days});if(sd.includes(i)){dt++;if(checks[cid(cat.id,t.id,i,sub.id)])dd++;}});
      } else {const sd=getScheduledDays(t);if(sd.includes(i)){dt++;if(checks[cid(cat.id,t.id,i)])dd++;}}
    }));
    if(dt>0&&dd/dt>=0.5)streak++;else break;
  }
  document.getElementById('st-streak').textContent=streak+' jour'+(streak!==1?'s':'');
  document.getElementById('st-streak').className='stat-val '+(streak>=3?'good':'');

  const cont=document.getElementById('cats');
  let html='';

  renderData.categories.forEach(cat=>{
    const cs=s.bycat[cat.id]||{don:0,tot:1,pct:0};
    const isOpen=openCats[cat.id]!==false;
    html+=`<div class="cat-block">
      <div style="display:flex;align-items:center">
        <div class="cat-header" onclick="toggleCat('${cat.id}')" style="flex:1;border-radius:0">
          <div class="cat-dot" style="background:${cat.color}"></div>
          <span class="cat-name">${cat.name}</span>
          <span class="cat-pct">${cs.pct}% &middot; ${cs.don}/${cs.tot}</span>
          <span class="cat-arrow ${isOpen?'open':''}">&#9658;</span>
        </div>
        <div style="display:flex;flex-direction:column;padding:0 10px;gap:1px;flex-shrink:0">
          <button onclick="moveCat('${cat.id}',-1)" title="Monter" style="padding:2px 6px;font-size:11px;line-height:1;border-radius:4px;${renderData.categories.indexOf(cat)===0?'opacity:.2;cursor:default':''}">▲</button>
          <button onclick="moveCat('${cat.id}',1)" title="Descendre" style="padding:2px 6px;font-size:11px;line-height:1;border-radius:4px;${renderData.categories.indexOf(cat)===renderData.categories.length-1?'opacity:.2;cursor:default':''}">▼</button>
        </div>
      </div>
      <div class="cat-bar-outer"><div class="cat-bar-inner" style="width:${cs.pct}%;background:${cat.color}"></div></div>`;

    if(isOpen){
      let thead='<tr><th class="tcol">Tâche</th>';
      dates.forEach((d,i)=>{
        const isToday=d.toDateString()===today.toDateString();
        thead+=`<th class="${d>today?'future-head':''}" style="${isToday?'color:#1D9E75;font-weight:700':''}">${DAYS_SHORT[i]}<br><span style="font-size:10px;font-weight:400">${d.getDate()}</span>${isToday?'<br><span style="font-size:9px;color:#1D9E75">●</span>':''}</th>`;
      });
      thead+='<th>Aujourd\'hui</th><th>Semaine</th><th></th></tr>';

      let tbody='';
      cat.tasks.forEach(task=>{
        const subs=task.subtasks||[];
        const taskDays=getScheduledDays(task);
        const isEditing=editingTask&&editingTask.catId===cat.id&&editingTask.taskId===task.id&&!editingTask.subId;

        function chkCell(catId,taskId,dayIdx,subId,taskName){
          const id=cid(catId,taskId,dayIdx,subId||null);
          const nid=noteId(catId,taskId,dayIdx,subId||null);
          const checked=!!checks[id];
          const hasNote=!!notes[nid];
          const hasPrevNote=!!prevNotes[nid];
          const fut=dates[dayIdx]>today;
          const dayName=DAYS_FULL[dayIdx];
          const tname=taskName.replace(/'/g,"\\'").replace(/"/g,'&quot;');
          const pn=prevNotes[nid];
          // note edit button (shown on hover via CSS, only when checked or has prev note)
          const noteBtn=`<button class="note-btn" onclick="openNoteModal('${catId}','${taskId}',${dayIdx},${subId?`'${subId}'`:'null'},'${tname}','${dayName}')" title="${hasNote?'Modifier la note':'Ajouter une note'}">✎</button>`;
          let inner=`<div class="chk-wrap">
            <input type="checkbox" ${checked?'checked':''} ${fut?'disabled':''} onchange="toggleChk('${catId}','${taskId}',${dayIdx},${subId?`'${subId}'`:'null'},'${tname}','${dayName}',this,${weekOffset})">
            ${hasNote?`<span class="note-dot"></span>`:''}
            ${hasPrevNote&&!hasNote?`<span class="has-note-prev"></span>`:''}
            ${!fut?noteBtn:''}
          </div>`;
          if(pn){
            inner=`<div class="tooltip-wrap">${inner}<div class="tooltip-box">Sem. préc.:\n${escHtml(pn)}</div></div>`;
          }
          return `<td class="chk-cell scheduled ${fut?'future-head':''}">${inner}</td>`;
        }

        // todayIdx = index 0-6 of today in this week
        const todayIdx=dates.findIndex(d=>d.toDateString()===today.toDateString());

        function todayCell(catId,taskId,subId,scheduledDays){
          if(todayIdx<0||!scheduledDays.includes(todayIdx)){
            return `<td class="pct-cell" style="color:#ccc">—</td>`;
          }
          const done=!!checks[cid(catId,taskId,todayIdx,subId||null)];
          const color=done?'#1D9E75':'#E24B4A';
          const label=done?'✓':'✗';
          return `<td class="pct-cell" style="color:${color};font-size:14px">${label}</td>`;
        }

        const isPonctual=!!task.ponctual;
        const delBtn=isPonctual
          ?`<button class="icon-btn del" onclick="delPonctual('${task.id}')">&#10005;</button>`
          :`<button class="icon-btn del" onclick="delTask('${cat.id}','${task.id}')">&#10005;</button>`;
        const editBtn=isPonctual?'':`<button class="icon-btn edit" onclick="startEdit('${cat.id}','${task.id}')">&#9998;</button>`;
        const poncBadge=isPonctual?`<span class="freq-badge once">Cette sem.</span>`:'';

        if(subs.length>0){
          let pd=0,pt=0;
          subs.forEach(sub=>{const sd=getScheduledDays(sub.days&&sub.days.length?sub:{days:task.days});sd.forEach(d=>{pt++;if(checks[cid(cat.id,task.id,d,sub.id)])pd++;});});
          const pp=pt?Math.round(pd/pt*100):0;
          const parentReached=pd>=pt&&pt>0;

          // Today column for parent: check if all subtasks scheduled today are done
          const todayIdx2=dates.findIndex(d=>d.toDateString()===today.toDateString());
          let todaySubDone=0,todaySubTotal=0;
          if(todayIdx2>=0){
            subs.forEach(sub=>{
              const sd=getScheduledDays(sub.days&&sub.days.length?sub:{days:task.days});
              if(sd.includes(todayIdx2)){todaySubTotal++;if(checks[cid(cat.id,task.id,todayIdx2,sub.id)])todaySubDone++;}
            });
          }
          let parentTodayCell='<td class="pct-cell" style="color:#ccc">—</td>';
          if(todaySubTotal>0){
            const allDone=todaySubDone===todaySubTotal;
            const color=allDone?'#1D9E75':todaySubDone>0?'#BA7517':'#E24B4A';
            parentTodayCell=`<td class="pct-cell" style="color:${color};font-size:12px;font-weight:600">${todaySubDone}/${todaySubTotal}</td>`;
          }

          tbody+=`<tr><td class="tname" style="font-weight:600">${task.name}<span class="freq-badge ${parentReached?'reached':''}">${pd}/${pt}</span>${poncBadge}</td>`;
          for(let d=0;d<7;d++)tbody+=`<td style="background:#fafaf8"></td>`;
          tbody+=`${parentTodayCell}<td class="pct-cell">${pp}%</td><td class="action-cell">
            ${editBtn}${delBtn}
          </td></tr>`;
          if(isEditing)tbody+=editRowHtml(cat.id,task.id,null,task.name,taskDays);
          subs.forEach(sub=>{
            const subDays=getScheduledDays(sub.days&&sub.days.length?sub:{days:task.days});
            let sn=0;subDays.forEach(d=>{if(checks[cid(cat.id,task.id,d,sub.id)])sn++;});
            const isEditSub=editingTask&&editingTask.catId===cat.id&&editingTask.taskId===task.id&&editingTask.subId===sub.id;
            tbody+=`<tr class="subrow"><td class="tname sub">${sub.name}<span class="freq-badge ${sn>=subDays.length&&subDays.length>0?'reached':''}">${sn}/${subDays.length}</span></td>`;
            for(let d=0;d<7;d++){
              if(subDays.includes(d)) tbody+=chkCell(cat.id,task.id,d,sub.id,sub.name);
              else tbody+=`<td class="unscheduled"><span class="dash">&middot;</span></td>`;
            }
            tbody+=todayCell(cat.id,task.id,sub.id,subDays);
            tbody+=`<td class="pct-cell">${subDays.length?Math.round(sn/subDays.length*100):0}%</td><td class="action-cell">
              <button class="icon-btn edit" onclick="startEdit('${cat.id}','${task.id}','${sub.id}')">&#9998;</button>
              <button class="icon-btn del" onclick="delSub('${cat.id}','${task.id}','${sub.id}')">&#10005;</button>
            </td></tr>`;
            if(isEditSub)tbody+=editRowHtml(cat.id,task.id,sub.id,sub.name,subDays);
          });
          tbody+=`<tr><td colspan="11" style="padding:6px 16px 6px 32px;background:#fafaf8"><button onclick="showAddSub('${cat.id}','${task.id}')" style="font-size:11px;border:none;background:none;color:#aaa;cursor:pointer;padding:0">+ sous-tâche</button></td></tr>`;
        } else {
          let n=0;taskDays.forEach(d=>{if(checks[cid(cat.id,task.id,d)])n++;});
          const tp=taskDays.length?Math.round(n/taskDays.length*100):0;
          tbody+=`<tr><td class="tname">${task.name}<span class="freq-badge ${n>=taskDays.length&&taskDays.length>0?'reached':''}">${n}/${taskDays.length}</span>${poncBadge}</td>`;
          for(let d=0;d<7;d++){
            if(taskDays.includes(d)) tbody+=chkCell(cat.id,task.id,d,null,task.name);
            else tbody+=`<td class="unscheduled"><span class="dash">&middot;</span></td>`;
          }
          tbody+=todayCell(cat.id,task.id,null,taskDays);
          tbody+=`<td class="pct-cell">${tp}%</td><td class="action-cell">
            ${editBtn}${delBtn}
          </td></tr>`;
          if(isEditing&&!isPonctual)tbody+=editRowHtml(cat.id,task.id,null,task.name,taskDays);
          if(!isPonctual){
            tbody+=`<tr><td colspan="11" style="padding:4px 16px 4px 28px;background:#fafaf8"><button onclick="showAddSub('${cat.id}','${task.id}')" style="font-size:11px;border:none;background:none;color:#bbb;cursor:pointer;padding:0">+ sous-tâche</button></td></tr>`;
          }
        }
      });

      // Day % footer row
      let dayPctRow=`<tr style="background:#f5f5f3;border-top:2px solid #e5e5e3"><td class="tname" style="font-size:11px;font-weight:600;color:#aaa;padding-top:8px;padding-bottom:8px">% du jour</td>`;
      for(let d=0;d<7;d++){
        let dd=0,dt=0;
        cat.tasks.forEach(t=>{
          const subs=t.subtasks||[];
          if(subs.length>0){
            subs.forEach(sub=>{
              const sd=getScheduledDays(sub.days&&sub.days.length?sub:{days:t.days});
              if(sd.includes(d)){dt++;if(checks[cid(cat.id,t.id,d,sub.id)])dd++;}
            });
          } else {
            const sd=getScheduledDays(t);
            if(sd.includes(d)){dt++;if(checks[cid(cat.id,t.id,d)])dd++;}
          }
        });
        const dpct=dt?Math.round(dd/dt*100):null;
        const isFut=dates[d]>today;
        const isToday=dates[d].toDateString()===today.toDateString();
        let color=dpct===null?'#ccc':dpct>=100?'#1D9E75':dpct>=50?'#BA7517':'#E24B4A';
        if(isFut) color='#ccc';
        const label=isFut?'—':(dpct===null?'—':dpct+'%');
        dayPctRow+=`<td style="font-size:11px;font-weight:700;color:${color};padding:8px 4px;text-align:center;${isToday?'background:#f0faf5':''}">${label}</td>`;
      }
      dayPctRow+=`<td colspan="3"></td></tr>`;
      tbody+=dayPctRow;

      const isAddTask=addingTo===cat.id+'_task';
      const isAddSub=addingTo&&addingTo.startsWith(cat.id+'_sub_');
      let addForm='';
      if(isAddTask){
        const pf='new_'+cat.id;window._formDays[pf]=[0,1,2];
        addForm=`<div class="form-row">
          <div class="form-group"><label>Nom</label><input type="text" id="nt" placeholder="Nom de la tâche" style="width:150px"/></div>
          <div class="form-group"><label>Jours</label><div class="day-picker">${dayPickerHtml(window._formDays[pf],pf)}</div></div>
          <div class="form-group"><label>Récurrence</label><select id="nrecur"><option value="recurring">Toutes les semaines</option><option value="once">Cette semaine seulement</option></select></div>
          <div class="form-actions"><button onclick="confirmTask('${cat.id}','${pf}')">Ajouter</button><button onclick="cancelAdd()">Annuler</button></div>
        </div>`;
      } else if(isAddSub){
        const tid=addingTo.split('_sub_')[1];
        const ptask=renderData.categories.find(c=>c.id===cat.id)?.tasks.find(t=>t.id===tid);
        const pf='newsub_'+cat.id+'_'+tid;
        window._formDays[pf]=ptask?[...ptask.days]:[0,2,4];
        addForm=`<div class="form-row" style="padding-left:32px;background:#f5faf8">
          <div class="form-group"><label>Sous-tâche</label><input type="text" id="ns" placeholder="Nom de la sous-tâche" style="width:160px"/></div>
          <div class="form-group"><label>Jours</label><div class="day-picker">${dayPickerHtml(window._formDays[pf],pf)}</div></div>
          <div class="form-actions"><button onclick="confirmSub('${cat.id}','${tid}','${pf}')">Ajouter</button><button onclick="cancelAdd()">Annuler</button></div>
        </div>`;
      } else {
        addForm=`<div class="add-row"><button onclick="showAddTask('${cat.id}')">+ Ajouter une tâche</button></div>`;
      }

      html+=`<div class="tbl-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table>${addForm}</div>`;
    }
    html+='</div>';
  });

  if(addingTo==='new_cat'){
    html+=`<div style="border:1px dashed #ccc;border-radius:12px;padding:14px 16px;margin-bottom:12px;background:#fff">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Nouvelle catégorie</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="nc" placeholder="Nom" style="font-size:13px;padding:5px 9px;border:1px solid #ccc;border-radius:8px;width:170px"/>
        <button onclick="confirmCat()">Créer</button><button onclick="cancelAdd()">Annuler</button>
      </div></div>`;
  }
  html+=`<div style="margin-top:8px"><button onclick="showAddCat()">+ Ajouter une catégorie</button></div>`;
  cont.innerHTML=html;
  requestAnimationFrame(()=>{
    const el=document.getElementById('et-name')||document.getElementById('nt')||document.getElementById('ns')||document.getElementById('nc');
    if(el)el.focus({preventScroll:true});
  });
}

function editRowHtml(catId,taskId,subId,currentName,currentDays){
  const pf='edit_'+catId+'_'+taskId+(subId?'_'+subId:'');
  window._formDays[pf]=[...currentDays];
  const indent=subId?'32px':'16px';
  return `<tr><td colspan="10" style="padding:10px 16px 10px ${indent};background:#EBF4FF;border-bottom:1px solid #b5d4f4">
    <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
      <div class="form-group"><label>Nom</label><input type="text" id="et-name" value="${currentName}" style="font-size:13px;padding:5px 9px;border:1px solid #ccc;border-radius:8px;width:155px"/></div>
      <div class="form-group"><label>Jours</label><div class="day-picker">${dayPickerHtml(currentDays,pf)}</div></div>
      <div class="form-actions" style="padding-top:18px">
        <button onclick="saveEdit('${catId}','${taskId}',${subId?`'${subId}'`:'null'},'${pf}')">Enregistrer</button>
        <button onclick="cancelEdit()">Annuler</button>
      </div>
    </div>
  </td></tr>`;
}

async function toggleChk(catId,taskId,dayIdx,subId,taskName,dayName,el,renderedWeekOffset){
  // Use the weekOffset that was active when this checkbox was rendered, not the current one
  const targetOffset=renderedWeekOffset!==undefined?renderedWeekOffset:weekOffset;
  const c=await loadChk(targetOffset);
  const id=cid(catId,taskId,dayIdx,subId||null);
  c[id]=el.checked;
  if(!c[id])delete c[id];
  saveChk(c,targetOffset); // instant
  if(targetOffset===0)archiveCurrentWeek(); // background, no await
  // Only rerender if we're still viewing the same week
  if(targetOffset===weekOffset){
    const _sy=window.scrollY;await render();window.scrollTo({top:_sy,behavior:'instant'});
  }
}

// ---- HISTORY RENDER ----
async function renderHistory(){
  const arch=await loadArchive();
  const cont=document.getElementById('hist-content');
  if(!arch.length){cont.innerHTML='<div class="hist-empty">Aucun historique pour l\'instant.<br>Les semaines sont archivées automatiquement.</div>';return;}
  // group by year then month
  const byYear={};
  arch.forEach(w=>{
    const y=w.year;const m=w.month;
    if(!byYear[y])byYear[y]={};
    if(!byYear[y][m])byYear[y][m]=[];
    byYear[y][m].push(w);
  });
  let html='';
  Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{
    html+=`<div class="hist-year"><div class="hist-year-title">&#128197; ${year}</div>`;
    Object.keys(byYear[year]).sort((a,b)=>b-a).forEach(month=>{
      html+=`<div class="hist-month"><div class="hist-month-title">${MONTHS[month]}</div>`;
      byYear[year][month].slice().reverse().forEach(w=>{
        const wid='w_'+w.date.replace(/-/g,'');
        const isOpen=openHistWeeks[wid];

        const cls=w.pct>=70?'hist-week-pct':w.pct>=40?'hist-week-pct warn':'hist-week-pct low';
        html+=`<div class="hist-week">
          <div class="hist-week-header" onclick="toggleHistWeek('${wid}')">
            <span class="hist-week-label">${w.label}</span>
            <span class="${cls}">${w.pct}%</span>
            <span style="font-size:11px;color:#aaa;margin-left:6px">${w.don}/${w.tot}</span>
            <span style="font-size:11px;color:#aaa;margin-left:4px">${isOpen?'&#9650;':'&#9660;'}</span>
          </div>
          <div class="hist-detail ${isOpen?'open':''}">`;
        if(w.bycat){
          Object.values(w.bycat).forEach(cat=>{
            html+=`<div class="hist-cat-row">
              <div class="hist-cat-name">${cat.name}</div>
              <div class="hist-cat-bar"><div class="hist-cat-fill" style="width:${cat.pct}%;background:${cat.color||'#1D9E75'}"></div></div>
              <div class="hist-cat-pct">${cat.pct}%</div>
            </div>`;
          });
        }
        // notes from that week
        if(w.notes&&Object.keys(w.notes).length>0){
          html+=`<div style="margin-top:10px;padding-top:8px;border-top:1px solid #f0f0ee"><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Notes d'entraînement</div>`;
          Object.entries(w.notes).forEach(([nid,note])=>{
            const parts=nid.split('_');
            const dayIdx=parseInt(parts[parts.length-1]);
            const dayName=DAYS_FULL[dayIdx]||'';
            html+=`<div class="hist-note-entry"><span class="hist-note-day">${dayName}</span><span>${escHtml(note)}</span></div>`;
          });
          html+=`</div>`;
        }
        html+=`</div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  cont.innerHTML=html;
}

function toggleHistWeek(wid){
  openHistWeeks[wid]=!openHistWeeks[wid];
  renderHistory();
}

// ---- ACTIONS ----
function scrollY_(){return window.scrollY;}
function scrollTo_(y){window.scrollTo({top:y,behavior:'instant'});}
async function rerender(){const y=scrollY_();await render();scrollTo_(y);}

async function moveCat(catId,dir){
  const data=await loadStruct();
  const idx=data.categories.findIndex(c=>c.id===catId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=data.categories.length)return;
  const tmp=data.categories[idx];data.categories[idx]=data.categories[newIdx];data.categories[newIdx]=tmp;
  saveStruct(data);await rerender();
}
async function toggleCat(id){openCats[id]=openCats[id]===false?true:false;await rerender();}
async function changeWeek(d){
  weekOffset+=d;
  addingTo=null;editingTask=null;
  // Render immediately from cache/localStorage (instant)
  await render();
  // Then prefetch this week's data from network in background
  prefetchWeek(weekOffset);
}
async function goToday(){
  weekOffset=0;
  addingTo=null;editingTask=null;
  await render();
  prefetchWeek(0);
}

// Prefetch a week's keys from network into cache (non-blocking)
function prefetchWeek(off){
  [ck(off),nk(off),ponctualKey(off)].forEach(key=>{
    if(_cache[key]!==undefined)return; // already cached
    fetch(`${GS_URL}?action=load&key=${encodeURIComponent(key)}`)
      .then(r=>r.json()).then(j=>{
        if(j.value){_cache[key]=j.value;lsSet(key,j.value);}
      }).catch(()=>{});
  });
}
async function showAddTask(id){addingTo=id+'_task';editingTask=null;await rerender();}
async function showAddSub(c,t){addingTo=c+'_sub_'+t;editingTask=null;await rerender();}
async function showAddCat(){addingTo='new_cat';editingTask=null;await rerender();}
async function cancelAdd(){addingTo=null;await rerender();}
async function startEdit(c,t,s){editingTask={catId:c,taskId:t,subId:s||null};addingTo=null;await rerender();}
async function cancelEdit(){editingTask=null;await rerender();}

async function saveEdit(catId,taskId,subId,pf){
  const name=(document.getElementById('et-name')||{}).value||'';
  const days=[...(window._formDays[pf]||[0])].sort((a,b)=>a-b);
  if(!name.trim())return;
  const data=await loadStruct();
  const cat=data.categories.find(c=>c.id===catId);if(!cat)return;
  const task=cat.tasks.find(t=>t.id===taskId);if(!task)return;
  if(subId){const sub=task.subtasks.find(s=>s.id===subId);if(!sub)return;sub.name=name.trim();sub.days=days;}
  else{task.name=name.trim();task.days=days;}
  saveStruct(data);editingTask=null;await rerender();
}
// Ponctual tasks stored per-week alongside checks
function ponctualKey(off){return 'tr_p4_'+(off===undefined?weekOffset:off);}
async function loadPonctual(off){const s=await gsGet(ponctualKey(off));return s?JSON.parse(s):[];}
async function savePonctual(p,off){await gsSet(ponctualKey(off),JSON.stringify(p));}

async function confirmTask(catId,pf){
  const name=(document.getElementById('nt')||{}).value||'';if(!name.trim())return;
  const days=[...(window._formDays[pf]||[0,1,2])].sort((a,b)=>a-b);
  const recur=(document.getElementById('nrecur')||{}).value||'recurring';
  const id='t'+Date.now();

  if(recur==='once'){
    // Save as ponctual task for this week only
    const ponctual=await loadPonctual();
    ponctual.push({id,catId,name:name.trim(),days,subtasks:[]});
    savePonctual(ponctual);
  } else {
    const data=await loadStruct();const cat=data.categories.find(c=>c.id===catId);if(!cat)return;
    cat.tasks.push({id,name:name.trim(),days,subtasks:[]});
    saveStruct(data);
  }
  addingTo=null;await rerender();
}
async function confirmSub(catId,taskId,pf){
  const name=(document.getElementById('ns')||{}).value||'';if(!name.trim())return;
  const days=[...(window._formDays[pf]||[0,2,4])].sort((a,b)=>a-b);
  const data=await loadStruct();const cat=data.categories.find(c=>c.id===catId);if(!cat)return;
  const task=cat.tasks.find(t=>t.id===taskId);if(!task)return;
  if(!task.subtasks)task.subtasks=[];
  task.subtasks.push({id:'s'+Date.now(),name:name.trim(),days});
  saveStruct(data);addingTo=null;await rerender();
}
async function confirmCat(){
  const name=(document.getElementById('nc')||{}).value||'';if(!name.trim())return;
  const data=await loadStruct();
  data.categories.push({id:'cat'+Date.now(),name:name.trim(),color:COLORS[data.categories.length%COLORS.length],tasks:[]});
  saveStruct(data);addingTo=null;await rerender();
}
async function delPonctual(taskId){
  if(!confirm('Supprimer cette tâche ponctuelle?'))return;
  const ponctual=await loadPonctual();
  savePonctual(ponctual.filter(p=>p.id!==taskId));
  await rerender();
}
async function delTask(catId,taskId){
  if(!confirm('Supprimer cette tâche?'))return;
  const data=await loadStruct();const cat=data.categories.find(c=>c.id===catId);
  if(cat)cat.tasks=cat.tasks.filter(t=>t.id!==taskId);
  saveStruct(data);await rerender();
}
async function delSub(catId,taskId,subId){
  if(!confirm('Supprimer cette sous-tâche?'))return;
  const data=await loadStruct();const cat=data.categories.find(c=>c.id===catId);if(!cat)return;
  const task=cat.tasks.find(t=>t.id===taskId);
  if(task&&task.subtasks)task.subtasks=task.subtasks.filter(s=>s.id!==subId);
  saveStruct(data);await rerender();
}

async function resetWeek(){
  if(!confirm('Réinitialiser la semaine?\n\nVos données seront archivées avant effacement.'))return;
  await archiveCurrentWeek();
  await gsDel(ck());
  await gsDel(nk());
  await rerender();
}

async function buildWeekTxt(off){
  const saved=weekOffset;weekOffset=off;
  const data=await loadStruct();const checks=await loadChk();const notes=await loadNotes();const dates=getWeekDates();const s=computeStats(data,checks);
  weekOffset=saved;
  let txt=`===== Semaine du ${fmt(dates[0])} au ${fmt(dates[6])} =====\nProgression : ${s.pct}% (${s.don}/${s.tot})\n\n`;
  data.categories.forEach(cat=>{
    const cs=s.bycat[cat.id]||{pct:0};
    txt+=`[${cat.name}] ${cs.pct}%\n`;
    cat.tasks.forEach(t=>{
      const subs=t.subtasks||[];const days=getScheduledDays(t);
      if(subs.length>0){
        txt+=`  ${t.name} (${freqLabel(days)})\n`;
        subs.forEach(sub=>{
          const sd=getScheduledDays(sub.days&&sub.days.length?sub:{days:t.days});
          let n=0;sd.forEach(d=>{if(checks[cid(cat.id,t.id,d,sub.id)])n++;});
          txt+=`    - ${sub.name}: ${n}/${sd.length}\n`;
          sd.forEach(d=>{const note=notes[noteId(cat.id,t.id,d,sub.id)];if(note)txt+=`      ${DAYS_FULL[d]}: ${note}\n`;});
        });
      } else {
        let n=0;days.forEach(d=>{if(checks[cid(cat.id,t.id,d)])n++;});
        txt+=`  ${t.name}: ${n}/${days.length}\n`;
        days.forEach(d=>{const note=notes[noteId(cat.id,t.id,d,null)];if(note)txt+=`    ${DAYS_FULL[d]}: ${note}\n`;});
      }
    });txt+='\n';
  });
  return txt;
}
async function exportTxt(){
  const dates=getWeekDates();
  dl(await buildWeekTxt(weekOffset),'tracker_semaine_'+dates[0].toISOString().slice(0,10)+'.txt');
}
async function exportAll(){
  const arch=await loadArchive();
  let txt='===== HISTORIQUE COMPLET =====\n\n';
  arch.forEach(w=>{
    txt+=`===== ${w.label} — ${w.pct}% =====\n`;
    if(w.bycat)Object.values(w.bycat).forEach(c=>{txt+=`  ${c.name}: ${c.pct}%\n`;});
    if(w.notes&&Object.keys(w.notes).length){
      txt+=`  Notes:\n`;
      Object.entries(w.notes).forEach(([nid,note])=>{
        const parts=nid.split('_');const dayIdx=parseInt(parts[parts.length-1]);
        txt+=`    ${DAYS_FULL[dayIdx]||''}: ${note}\n`;
      });
    }
    txt+='\n';
  });
  dl(txt,'tracker_historique_'+new Date().toISOString().slice(0,10)+'.txt');
}
function dl(content,filename){
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(content);
  a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function getDailyQuote(){
  const dayOfYear=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/(1000*60*60*24));
  return QUOTES[dayOfYear%QUOTES.length];
}

// init
let _appReady=false;
(async()=>{
  const q=getDailyQuote();
  document.getElementById('load-quote-txt').innerHTML=`"${q.q}"<strong>— ${q.a}</strong>`;

  const statusEl=document.getElementById('load-status-txt');
  const steps=['INITIALISATION','CHARGEMENT DES DONNÉES','SYNCHRONISATION','PRÊT'];
  let step=0;
  const stepInterval=setInterval(()=>{
    step=Math.min(step+1,steps.length-1);
    if(statusEl)statusEl.textContent=steps[step];
  },700);

  await archiveCurrentWeek();
  await render();
  _appReady=true;

  clearInterval(stepInterval);

  const appDiv=document.getElementById('main-app');
  if(appDiv)appDiv.style.opacity='1';

  const ls=document.getElementById('loading-screen');
  if(ls){
    ls.style.transition='opacity .6s ease';
    ls.style.opacity='0';
    setTimeout(()=>{ls.style.display='none';},650);
  }
})();
